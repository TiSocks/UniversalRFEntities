name: Release

on:
  release:
    types: [published]

jobs:
  update_version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Update manifest.json version
        run: |
          # Strip 'v' prefix if it exists
          VERSION="${{ github.event.release.tag_name }}"
          VERSION=${VERSION#v}
          
          # Update manifest.json
          jq ".version = \"$VERSION\"" custom_components/rf_entities/manifest.json > tmp.json && mv tmp.json custom_components/rf_entities/manifest.json
          
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add custom_components/rf_entities/manifest.json
          
          # Only commit if there are changes
          if ! git diff --staged --empty; then
            git commit -m "chore: Auto-update manifest version to $VERSION"
            git push origin HEAD:master
          fi
