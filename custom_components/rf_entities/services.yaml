learn_command:
  name: Learn RF Command
  description: Puts a target RF entity (button or sensor) into learning mode. When an RF signal is received by the transceiver, its code is automatically associated with the target entity.
  fields:
    target_entity:
      name: Target Entity
      description: The button, sensor, or binary sensor entity to learn the RF code for.
      required: true
      selector:
        entity:
          integration: rf_entities
          domain:
            - button
            - sensor
            - binary_sensor
    timeout:
      name: Timeout
      description: Time in seconds to listen for an RF transmission before aborting.
      required: false
      default: 30
      selector:
        number:
          min: 5
          max: 300
          step: 5
          unit_of_measurement: s
